            +'</div>'
          :'');
    }

    // Survival banner
    if (inSurvival) {
      var msLeft=Math.max(0,Math.round((state.survivalUntil-new Date().getTime())/3600000));
      h+='<div class="survival-banner">'
        +'<div class="survival-text"><div class="survival-title">\uD83C\uDF11 Survival Mode</div>'
        +'<div class="survival-sub">Chores off \u00b7 '+msLeft+'h left \u00b7 You\'re doing great</div></div>'
        +'<button class="survival-btn" onclick="toggleSurvivalMode()">End</button>'
        +'</div>';
    }

    // First use hint — brand new, no naps ever
    if (!everLoggedNap) {
      h+='<div style="border:1px dashed var(--border);border-radius:14px;padding:20px 16px;text-align:center;margin-top:8px">'
        +'<div style="font-size:28px;margin-bottom:10px">\uD83D\uDC76</div>'
        +'<div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px">Ready when '+babyName+' naps</div>'
        +'<div style="font-size:13px;color:var(--muted);line-height:1.7">Tap a button above the moment<br>'+babyName+' goes down.</div>'
        +'</div>';
    }

    // Day 2-6 nudge — keep momentum going toward Patterns unlock
    var allDaysHome = Object.keys(state.days).length;
    if (allDaysHome >= 2 && allDaysHome < 7) {
      var daysToPatterns = 7 - allDaysHome;
      h += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;margin-top:10px;display:flex;align-items:center;gap:10px">'
        + '<div style="flex:1"><div style="font-size:12px;color:var(--muted);line-height:1.5">📈 <strong style="color:var(--text)">' + daysToPatterns + ' more day' + (daysToPatterns===1?'':'s') + '</strong> until your personalised prediction unlocks</div></div>'
        + '<div style="background:var(--border);border-radius:4px;height:4px;width:60px;flex-shrink:0"><div style="background:var(--teal);height:4px;border-radius:4px;width:' + Math.round(allDaysHome/7*100) + '%"></div></div>'
        + '</div>';
    }

    // Wake/bed times — compact, only after first nap day
    if (everLoggedNap) {
      h+='<div style="display:flex;gap:8px;margin-top:10px">'
        +'<div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:9px 12px">'
        +'<div style="font-size:10px;color:var(--amber);font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px">\uD83C\uDF05 Baby woke up</div>'
        +'<input type="time" class="field-input" style="margin:0;padding:0;border:none;background:transparent;font-size:15px;font-weight:700;color:'+(state.wakeTime?'var(--amber)':'var(--subtle)')+'" '+(state.wakeTime?'value="'+state.wakeTime+'"':'')+' onchange="setWake(this.value)"></div>'
        +'<div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:9px 12px">'
        +'<div style="font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px">\uD83C\uDF19 Baby\'s bedtime</div>'
        +'<input type="time" class="field-input" style="margin:0;padding:0;border:none;background:transparent;font-size:15px;font-weight:700;color:'+(state.bedTime?'var(--accent)':'var(--subtle)')+'" '+(state.bedTime?'value="'+state.bedTime+'"':'')+' onchange="setBed(this.value)"></div>'
        +'</div>';
    }
  }

  document.getElementById('tab-content').innerHTML=h;

  // Auto-dismiss first nap celebration after 5s
  var cel=document.getElementById('first-nap-celebrate');
  if (cel) {
    setTimeout(function(){
      var el=document.getElementById('first-nap-celebrate');
      if (el) el.style.transition='opacity 0.6s';
      if (el) el.style.opacity='0';
      setTimeout(function(){
        var el2=document.getElementById('first-nap-celebrate');
        if (el2) el2.remove();
      }, 600);
    }, 5000);
  }

  // Live timer
  if (ongoing&&document.getElementById('live-timer')) {
    clearInterval(window._timerInterval);
    window._timerInterval=setInterval(function(){
      var el=document.getElementById('live-timer');
      if (!el){clearInterval(window._timerInterval);return;}
      el.textContent=fmtDurSecs(elapsedSecs(ongoing.start));
    },1000);
  } else {
    clearInterval(window._timerInterval);
  }
}

function renderPatterns() {
  var el = document.getElementById('tab-content');
  var allDays = Object.entries(state.days).sort(function(a,b){ return b[0].localeCompare(a[0]); });
  var dayCount = allDays.length;
  var goal = PARENT_GOALS.find(function(g){ return g.id===state.parentGoal; }) || PARENT_GOALS[0];
  var vibe = SLEEP_VIBES.find(function(v){ return v.id===state.sleepVibe; }) || SLEEP_VIBES[1];

  // Empty state
  if (dayCount < 2) {
    el.innerHTML = '<div class="empty">'
      + '<div style="font-size:28px;margin-bottom:12px">📈</div>'
      + '<div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px">Patterns unlock as you log</div>'
      + '<div style="font-size:13px;color:var(--muted);line-height:1.7;max-width:260px;margin:0 auto">'
      + 'After a few days you\'ll see:<br>'
      + '· Average nap length<br>'
      + '· Best time of day for your goal<br>'
      + '· Your most reliable free window'
      + '</div></div>';
    return;
  }

  var allNaps = allDays.reduce(function(a,b){ return a.concat(b[1]); }, []);
  var done = allNaps.filter(function(n){ return n.start && n.end; });
  var avgDur = done.length > 0 ? Math.round(done.reduce(function(a,n){ return a+durMins(n.start,n.end); }, 0) / done.length) : 0;
  var avgPerDay = (allNaps.length / allDays.length).toFixed(1);
  var avgWW = getAvgWakeWindow();
  var contactPct = allNaps.length > 0 ? Math.round(allNaps.filter(function(n){ return n.type==='contact'; }).length / allNaps.length * 100) : 0;

  var showPrediction = dayCount >= 7;
  var showGaps       = dayCount >= 7;
  var showWeeklySummary = dayCount >= 14;

  var h = '';

  // ── Milestone detection ───────────────────────────────────────
  // Detect nap consolidation (3→2 or 2→1 naps per day) over last 7 days
  if (dayCount >= 7) {
    var recent7 = allDays.slice(0, 7);
    var older7  = allDays.slice(7, 14);
    if (older7.length >= 7) {
      var recentAvg = recent7.reduce(function(a,b){return a+b[1].length;},0) / 7;
      var olderAvg  = older7.reduce(function(a,b){return a+b[1].length;},0) / 7;
      var drop = olderAvg - recentAvg;
      if (drop >= 0.8) {
        var babyN = (state.babyProfile&&state.babyProfile.name)?state.babyProfile.name:'your baby';
        h += '<div style="background:linear-gradient(135deg,#1a2a1a,#141e14);border:1px solid var(--teal);border-radius:14px;padding:14px 16px;margin-bottom:12px">'
          + '<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px">🌱 ' + babyN + '\'s schedule is shifting</div>'
          + '<div style="font-size:13px;color:var(--muted);line-height:1.5">'
          + babyN + ' is averaging <strong style="color:var(--text)">' + recentAvg.toFixed(1) + ' naps/day</strong> this week, down from ' + olderAvg.toFixed(1) + '. '
          + 'Windows are getting longer — worth updating your goal in Profile.'
          + '</div>'
          + '<button onclick="switchTab(\'settings\',document.querySelectorAll(\'.tab\')[3])" style="margin-top:10px;background:var(--teal);border:none;border-radius:8px;color:#0f1117;font-size:13px;font-weight:700;padding:7px 14px;cursor:pointer;font-family:\'Inter\',sans-serif">Update my goal</button>'
          + '</div>';
      }
    }
  }

  // ── Monthly goal prompt ───────────────────────────────────────
  // Show if 28+ days logged and goal hasn't been changed in 28 days
  if (dayCount >= 28 && !state._goalPromptDismissed) {
    var firstDay = allDays[allDays.length-1][0];
    var firstDate = new Date(firstDay+'T12:00:00');
    var daysSinceStart = Math.floor((new Date() - firstDate) / 86400000);
    if (daysSinceStart >= 28) {
      h += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px">'
        + '<div style="flex:1">'
        + '<div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px">🎯 Still the right goal?</div>'
        + '<div style="font-size:13px;color:var(--muted);line-height:1.5">It\'s been a month. Priorities shift — is <strong style="color:var(--accent)">' + goal.label + '</strong> still what you want to protect?</div>'
        + '<button onclick="switchTab(\'settings\',document.querySelectorAll(\'.tab\')[3])" style="margin-top:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-weight:600;padding:6px 12px;cursor:pointer;font-family:\'Inter\',sans-serif">Review my goal</button>'
        + '</div>'
        + '<button onclick="dismissGoalPrompt()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0">\xd7</button>'
        + '</div>';
    }
  }

  // ── Tier progress nudge ───────────────────────────────────────
  if (!showPrediction) {
    var daysLeft = 7 - dayCount;
    h += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px">'
      + '<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">📈 Building your picture</div>'
      + '<div style="font-size:13px;color:var(--muted);line-height:1.5">Log <strong style="color:var(--text)">' + daysLeft + ' more day' + (daysLeft===1?'':'s') + '</strong> and we\'ll predict your best window for <strong style="color:var(--accent)">' + goal.label + '</strong> tomorrow.</div>'
      + '<div style="margin-top:10px;background:var(--border);border-radius:4px;height:4px">'
      + '<div style="background:var(--teal);height:4px;border-radius:4px;width:' + Math.round(dayCount/7*100) + '%"></div>'
      + '</div>'
      + '<div style="font-size:11px;color:var(--muted);margin-top:4px">' + dayCount + ' of 7 days</div>'
      + '</div>';
  } else if (!showWeeklySummary) {
    var daysLeft2 = 14 - dayCount;
    h += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:12px">'
      + '<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">📊 Weekly summary coming</div>'
      + '<div style="font-size:13px;color:var(--muted);line-height:1.5"><strong style="color:var(--text)">' + daysLeft2 + ' more day' + (daysLeft2===1?'':'s') + '</strong> until your weekly summary unlocks — a snapshot of the week\'s naps and your best window.</div>'
      + '<div style="margin-top:10px;background:var(--border);border-radius:4px;height:4px">'
      + '<div style="background:var(--teal);height:4px;border-radius:4px;width:' + Math.round(dayCount/14*100) + '%"></div>'
      + '</div>'
      + '<div style="font-size:11px;color:var(--muted);margin-top:4px">' + dayCount + ' of 14 days</div>'
      + '</div>';
  }

  // ── Weekly summary — replaces Gantt at day 14 ────────────────
  if (showWeeklySummary) {
    // Get this week's data
    var weekStart = new Date(); weekStart.setDate(weekStart.getDate() - 6); weekStart.setHours(0,0,0,0);
    var thisWeekDays = allDays.filter(function(e){
      return new Date(e[0]+'T12:00:00') >= weekStart;
    });
    var weekNaps = thisWeekDays.reduce(function(a,b){return a.concat(b[1]);}, []);
    var weekDone = weekNaps.filter(function(n){return n.start&&n.end;});
    var weekTotal = weekDone.reduce(function(a,n){return a+durMins(n.start,n.end);},0);

    // Find longest free window this week
    var longestWindow = 0, longestWindowDay = '';
    thisWeekDays.forEach(function(entry) {
      var date = entry[0];
      var sorted = entry[1].filter(function(n){return n.end;}).sort(function(a,b){return a.start.localeCompare(b.start);});
      for (var i=0; i<sorted.length-1; i++) {
        var gap = durMins(sorted[i].end, sorted[i+1].start);
        if (gap > longestWindow) { longestWindow = gap; longestWindowDay = date; }
      }
    });

    var longestDayLabel = '';
    if (longestWindowDay) {
      var d = new Date(longestWindowDay+'T12:00:00');
      longestDayLabel = d.toLocaleDateString('en-GB',{weekday:'long'});
    }

    h += '<div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:10px">'
      + '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);margin-bottom:12px">📊 This week</div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">'
      + '<div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-0.5px">'+weekDone.length+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px">Naps</div></div>'
      + '<div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--teal);letter-spacing:-0.5px">'+fmtDur(weekTotal)+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px">Total</div></div>'
      + '<div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--purple);letter-spacing:-0.5px">'+(longestWindow>0?fmtDur(longestWindow):'\u2014')+'</div><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px">Longest free</div></div>'
      + '</div>'
      + (longestWindowDay ? '<div style="font-size:12px;color:var(--muted);padding-top:10px;border-top:1px solid var(--border)">Best window this week: <strong style="color:var(--text)">'+longestDayLabel+'</strong></div>' : '')
      + '</div>';
  }

  // ── Stats 2x2 ─────────────────────────────────────────────────
  var startHours=done.map(function(n){return parseInt(n.start.split(':')[0]);});
  var hourFreq={};
  startHours.forEach(function(hr){hourFreq[hr]=(hourFreq[hr]||0)+1;});
  var peakHour=Object.keys(hourFreq).sort(function(a,b){return hourFreq[b]-hourFreq[a];})[0];
  var peakHourFmt=peakHour?fmtTime(pad(peakHour)+':00'):'\u2014';

  h += '<div class="stats-grid">';
  h += '<div class="stat-tile"><div class="stat-tile-label">Avg naps/day</div><div class="stat-tile-value" style="color:var(--accent)">'+avgPerDay+'</div><div class="stat-tile-sub">blocks</div></div>';
  h += '<div class="stat-tile"><div class="stat-tile-label">Avg nap length</div><div class="stat-tile-value" style="color:var(--teal)">'+fmtDur(avgDur)+'</div><div class="stat-tile-sub">per nap</div></div>';
  h += '<div class="stat-tile"><div class="stat-tile-label">First nap usually</div><div class="stat-tile-value" style="color:var(--amber);font-size:20px">'+peakHourFmt+'</div><div class="stat-tile-sub">most frequent</div></div>';
  h += '<div class="stat-tile"><div class="stat-tile-label">Between naps</div><div class="stat-tile-value" style="color:var(--purple);font-size:20px">'+fmtDur(avgWW)+'</div><div class="stat-tile-sub">avg awake time</div></div>';
  h += '</div>';

  // ── Prediction ────────────────────────────────────────────────
  if (showPrediction) {
    var goalNeedsFreehands = (goal.id==='fitness');
    var contactCount=done.filter(function(n){return n.type==='contact';}).length;
    var cotCount=done.filter(function(n){return n.type==='cot'||n.type==='pram';}).length;
    var likelyLabel = goalNeedsFreehands
      ? 'a Cot / Pram nap (you\'ll need both hands free)'
      : contactCount >= cotCount ? 'a Contact nap' : 'a Cot / Pram nap';
    var predTimeStr = peakHour ? fmtTime(pad(peakHour)+':00') : '\u2014';
    var confidence = vibe.id==='predictable' ? 'High confidence'
      : vibe.id==='chaos' ? 'Low confidence \u2014 naps vary a lot'
      : 'Low confidence \u2014 regression phase';

    h += '<div class="prediction-card">';
    h += '<div class="prediction-eyebrow">\uD83D\uDCA1 Based on ' + dayCount + ' days</div>';
    h += '<div class="prediction-body">Your best window for <strong>' + goal.label + '</strong> tomorrow is likely around <strong>' + predTimeStr + '</strong> during ' + likelyLabel + '.</div>';
    h += '<div class="prediction-stats">';
    h += '<div class="prediction-stat">\uD83D\uDCCA Avg naps: <strong>' + avgPerDay + '</strong></div>';
    h += '<div class="prediction-stat">\u23F1 Avg length: <strong>' + fmtDur(avgDur) + '</strong></div>';
    h += '<div class="prediction-stat">\uD83C\uDFAF <strong>' + confidence + '</strong></div>';
    h += '</div></div>';
  }

  // ── Gaps ──────────────────────────────────────────────────────
  if (showGaps) {
    var gaps = [];
    var firstNapMins = done.length > 0
      ? Math.round(done.map(function(n){
          return parseInt(n.start.split(':')[0])*60+parseInt(n.start.split(':')[1]);
        }).reduce(function(a,b){return a+b;},0)/done.length)
      : null;

    // Real free window — longest gap between naps (baby asleep) from history
    var longestFree = 0, longestFreeCount = 0;
    allDays.slice(0, 14).forEach(function(entry) {
      var sorted = entry[1].filter(function(n){return n.start&&n.end;}).sort(function(a,b){return a.start.localeCompare(b.start);});
      sorted.forEach(function(n) {
        var len = durMins(n.start, n.end);
        if (len > longestFree) longestFree = len;
        if (len >= 45) longestFreeCount++;
      });
    });

    if (longestFree >= 45) {
      gaps.push({
        icon:'\u2728', name:'Your best free window',
        detail:'Your longest nap recently was '+fmtDur(longestFree)+' — that\'s genuine free time while '+((state.babyProfile&&state.babyProfile.name)?state.babyProfile.name:'baby')+' sleeps. Naps of 45m+ happened '+longestFreeCount+' time'+(longestFreeCount!==1?'s':'')+' in the last two weeks.',
        badgeCls:'gap-badge-focus', cardCls:'gap-card-focus', badge:'BEST\nWINDOW'
      });
    }

    // Before first nap — baby is awake, lower-demand window
    if (firstNapMins) {
      var wakeBase = state.wakeTime
        ? parseInt(state.wakeTime.split(':')[0])*60+parseInt(state.wakeTime.split(':')[1])
        : 7*60;
      var morningGap = firstNapMins - wakeBase;
      if (morningGap >= 20) {
        gaps.push({
          icon:'\uD83C\uDF05', name:'Before first nap',
          detail:'About '+fmtDur(Math.round(morningGap))+' between '+(state.wakeTime?fmtTime(state.wakeTime):'wake up')+' and the first nap. Baby is awake, so this suits lower-demand tasks \u2014 feeding, play, getting yourself ready.',
          badgeCls:'gap-badge-quick', cardCls:'gap-card-quick', badge:'BABY\nAWAKE'
        });
      }
    }

    if (done.length >= 4) {
      var startMinsArr=done.map(function(n){return parseInt(n.start.split(':')[0])*60+parseInt(n.start.split(':')[1]);});
      var mean=startMinsArr.reduce(function(a,b){return a+b;},0)/startMinsArr.length;
      var variance=startMinsArr.reduce(function(a,b){return a+Math.pow(b-mean,2);},0)/startMinsArr.length;
      var stdDev=Math.round(Math.sqrt(variance));
      if (stdDev>25) {
        gaps.push({
          icon:'\uD83C\uDF07', name:'Nap times vary day to day',
          detail:'Naps don\'t start at a consistent time yet. Keep tasks short and easy to put down — the window might close sooner than expected.',
          badgeCls:'gap-badge-quick', cardCls:'gap-card-quick', badge:'STAY\nFLEXIBLE'
        });
      }
    }

    // Goal contact card — only for goals where one-handed phone tasks make sense
    if (contactPct >= 40 && goal.id !== 'fitness') {
      var babyNm=(state.babyProfile&&state.babyProfile.name)?state.babyProfile.name+'\'s':'';
      gaps.push({
        icon: goal.icon, name: goal.label+' one-handed',
        detail: Math.round(contactPct)+'% of '+babyNm+' naps are contact naps. Great for phone-based '+goal.label.toLowerCase()+' tasks — you\'re holding the baby but your mind is free.',
        badgeCls:'gap-badge-rest', cardCls:'gap-card-rest', badge:goal.icon+'\nGOAL'
      });
    } else if (contactPct >= 40 && goal.id === 'fitness') {
      // For fitness, flag the contact nap pattern as a constraint instead
      var babyNm2=(state.babyProfile&&state.babyProfile.name)?state.babyProfile.name+'\'s':'';
      gaps.push({
        icon:'\uD83D\uDCAA', name:'Most naps are contact naps',
        detail: Math.round(contactPct)+'% of '+babyNm2+' naps are contact naps \u2014 tricky for workouts. Aim your exercise at Cot / Pram naps, and use contact naps to rest and recover instead.',
        badgeCls:'gap-badge-rest', cardCls:'gap-card-rest', badge:'PLAN\nAHEAD'
      });
    }

    if (gaps.length > 0) {
      h += '<div class="gaps-title">\uD83D\uDCA1 Your recurring windows</div>';
      gaps.forEach(function(g){
        h += '<div class="gap-card '+g.cardCls+'">';
        h += '<div class="gap-card-left"><div class="gap-card-name">'+g.icon+' '+g.name+'</div>';
        h += '<div class="gap-card-detail">'+g.detail+'</div></div>';
        h += '<div class="gap-card-badge '+g.badgeCls+'">'+g.badge.replace('\n','<br>')+'</div>';
        h += '</div>';
      });
    }
  }

  el.innerHTML = h;
}

function renderHistory() {
  var allDays=Object.entries(state.days).sort(function(a,b){return b[0].localeCompare(a[0]);});
  var el=document.getElementById('tab-content');
  if (!allDays.length){el.innerHTML='<div class="empty">No history yet.<br>Start logging today!</div>';return;}

  function getWeekKey(dateStr) {
    var d=new Date(dateStr+'T12:00:00');
    var day=d.getDay();
    var diff=d.getDate()-day+(day===0?-6:1);
    var mon=new Date(d.setDate(diff));
    return mon.toISOString().split('T')[0];
  }

  var weeks={};
  allDays.forEach(function(entry){
    var wk=getWeekKey(entry[0]);
    if (!weeks[wk]) weeks[wk]=[];
    weeks[wk].push(entry);
  });

  var weekKeys=Object.keys(weeks).sort(function(a,b){return b.localeCompare(a);});
  var h='';

  weekKeys.forEach(function(wk){
    var days=weeks[wk];
    var isCurrentWeek=getWeekKey(todayKey())===wk;
    var weekOpen=isCurrentWeek||!!expandedDays['week_'+wk];
    var weekNaps=days.reduce(function(a,b){return a.concat(b[1]);}, []);
    var weekTotal=weekNaps.reduce(function(a,n){return a+(n.start&&n.end?durMins(n.start,n.end):0);},0);
    var weekNapCount=weekNaps.filter(function(n){return n.end;}).length;
    var wkDate=new Date(wk+'T12:00:00');
    var endDate=new Date(wk+'T12:00:00'); endDate.setDate(endDate.getDate()+6);
    var wkLabel=isCurrentWeek?'This week':wkDate.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' \u2013 '+endDate.toLocaleDateString('en-GB',{day:'numeric',month:'short'});

    h+='<div class="history-day" style="margin-bottom:8px">'
      +'<div class="history-day-header" onclick="toggleDay(\'week_'+wk+'\')">'
      +'<div><div class="history-day-title">'+wkLabel+'</div>'
      +'<div class="history-day-meta">'+weekNapCount+' nap'+(weekNapCount!==1?'s':'')+' \u00b7 '+fmtDur(weekTotal)+'</div>'
      +'</div><span class="history-day-chevron">'+(weekOpen?'\u25b2':'\u25bc')+'</span>'
      +'</div>';

    if (weekOpen) {
      h+='<div class="history-day-body open">';
      days.forEach(function(entry){
        var date=entry[0], dayNaps=entry[1];
        var isToday=date===todayKey();
        var sorted=dayNaps.slice().sort(function(a,b){return a.start.localeCompare(b.start);});
        var total=sorted.reduce(function(a,n){return a+durMins(n.start,n.end);},0);
        var d=new Date(date+'T12:00:00');
        var dayLabel=isToday?'Today':d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
        var dayOpen=isToday||!!expandedDays['day_'+date];

        h+='<div style="border-top:1px solid var(--border);padding:8px 0">'
          +'<div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:4px 0" onclick="toggleDay(\'day_'+date+'\')">'
          +'<div><div style="font-size:13px;font-weight:600;color:'+(isToday?'var(--teal)':'var(--text)')+'">'+dayLabel+'</div>'
          +'<div style="font-size:11px;color:var(--muted)">'+sorted.length+' nap'+(sorted.length!==1?'s':'')+' \u00b7 '+fmtDur(total)+'</div>'
          +'</div><span style="font-size:10px;color:var(--muted)">'+(dayOpen?'\u25b2':'\u25bc')+'</span>'
          +'</div>';

        if (dayOpen) {
          sorted.forEach(function(n,i){
            var dur=durMins(n.start,n.end);
            h+='<div class="nap-item">'
              +'<div class="nap-dot dot-'+n.type+'"></div>'
              +'<div class="nap-time">'+fmtTime(n.start)+' \u2192 '+(n.end?fmtTime(n.end):'...')+'</div>'
              +(dur>0?'<div class="nap-dur">'+fmtDur(dur)+'</div>':'')
              +'<div class="nap-type">'+n.type+'</div>'
              +'<button class="icon-btn" style="color:var(--accent)" onclick="editNap(\''+date+'\','+i+')">\u270e</button>'
              +'<button class="icon-btn" style="color:var(--muted)" onclick="deleteNap(\''+date+'\','+i+')">\xd7</button>'
              +'</div>';
          });
        }
        h+='</div>';
      });
      h+='</div>';
    }
    h+='</div>';
  });
  el.innerHTML=h;
}

function quickNap(type){
  var key=todayKey();
  if(!state.days[key])state.days[key]=[];
  state.days[key].push({start:nowStr(),end:'',type:type});
  windowRoutesOpen=false;
  saveState();toast(type==='contact'?'Contact nap started':'Cot / Pram nap started');render();
}

function endOngoingNap(){
  var key=todayKey();
  var naps=state.days[key]||[], on=null;
  for(var i=0;i<naps.length;i++){if(naps[i].start&&!naps[i].end){on=naps[i];break;}}
  if(on){on.end=nowStr();saveState();toast('Nap ended \u00b7 '+fmtDur(durMins(on.start,on.end)));render();}
}

function setWake(v){state.wakeTime=v;state.wakeDate=todayKey();saveState();toast('Wake time saved');render();}
function setBed(v){
  // If it's early morning (before 8am) and we already have a bed time from yesterday, edit yesterday
  var hour = new Date().getHours();
  var yest = _yest;
  if (hour < 8 && state.bedDate === yest) {
    state.bedTime = v; // keep bedDate as yesterday
  } else if (hour < 8 && !state.bedDate) {
    // Setting bed time early morning = logging last night
    state.bedTime = v; state.bedDate = yest;
  } else {
    state.bedTime = v; state.bedDate = todayKey();
  }
  saveState(); toast('Bedtime saved'); render();
}

function toggleChoreDone(){
  state.choreDone=!state.choreDone;state.choreDoneDate=todayKey();
  saveState();toast(state.choreDone?'Chore done!':'Chore unmarked');render();
}

function deleteNap(dateKey,index){
  if(!state.days[dateKey])return;
  state.days[dateKey].splice(index,1);
  if(!state.days[dateKey].length)delete state.days[dateKey];
  saveState();toast('Nap deleted');render();
}

function showTooltip(type) {
  // Handle wearing tooltip separately
  var boxId = type === 'wearing' ? 'wearing-tooltip' : 'tooltip-box';
  var box = document.getElementById(boxId);
  if (!box) return;
  var tips = {
    contact: '<strong>Contact nap</strong> — baby is asleep on you or being held. Your hands are busy but your phone is free. The app suggests things you can do one-handed.',
    cot: '<strong>Cot / Pram nap</strong> — baby is asleep somewhere safe without you holding them. You\'re completely free to move around and get things done.',
    wearing: '<strong>Baby wearing</strong> — toggle this on if you\'re carrying baby in a sling or carrier. The app will swap any chores that need two free hands for something you can do while wearing.'
  };
  if (box.style.display === 'block' && box.dataset.type === type) {
    box.style.display = 'none';
  } else {
    box.innerHTML = tips[type] || '';
    box.dataset.type = type;
    box.style.display = 'block';
  }
}

function toggleTodayNaps(){expandedDays['__today_naps__']=!expandedDays['__today_naps__'];render();}

function toggleWindowRoutes(){windowRoutesOpen=!windowRoutesOpen;render();}

function toggleDay(date){
  expandedDays[date]=!expandedDays[date];renderHistory();
}

function toggleSettingsGroup(id){
  expandedSettings[id]=!expandedSettings[id];renderSettings();
}

function openForm(){
  formEditingNap=null;formSelectedType='contact';
  document.getElementById('f-date').value=todayKey();
  document.getElementById('f-start').value=nowStr();
  document.getElementById('f-end').value='';
  document.getElementById('form-title').textContent='Log nap';
  document.getElementById('form-save-btn').textContent='Save nap';
  updateTypePills();
  document.getElementById('form-overlay').classList.add('open');
}

function editNap(dateKey,index){
  var nap=state.days[dateKey]&&state.days[dateKey][index];
  if(!nap)return;
  formEditingNap={dateKey:dateKey,index:index};formSelectedType=nap.type||'contact';
  document.getElementById('f-date').value=dateKey;
  document.getElementById('f-start').value=nap.start||'';
  document.getElementById('f-end').value=nap.end||'';
  document.getElementById('form-title').textContent='Edit nap';
  document.getElementById('form-save-btn').textContent='Update nap';
  updateTypePills();
  document.getElementById('form-overlay').classList.add('open');
}

function closeForm(){document.getElementById('form-overlay').classList.remove('open');}
function handleOverlayClick(e){if(e.target===document.getElementById('form-overlay'))closeForm();}

function selType(t){formSelectedType=t;updateTypePills();}
function updateTypePills(){
  var types=['contact','cot'];
  document.querySelectorAll('.type-pill').forEach(function(p,i){
    p.className='type-pill'+(formSelectedType===types[i]?' sel-'+types[i]:'');
  });
}

function saveForm(){
  var start=document.getElementById('f-start').value;
  var end=document.getElementById('f-end').value;
  var date=document.getElementById('f-date').value;
  if(!start||!date){toast('Please fill in start time');return;}
  if(formEditingNap){
    state.days[formEditingNap.dateKey][formEditingNap.index]={start:start,end:end||'',type:formSelectedType};
    toast('Nap updated');
  } else {
    if(!state.days[date])state.days[date]=[];
    state.days[date].push({start:start,end:end||'',type:formSelectedType});
    toast('Nap saved');
  }
  saveState();closeForm();render();
}

function saveChoreCfg(field,val){
  state.choreConfig[field]=val==='null'?null:parseInt(val);
  saveState();renderSettings();
}

function saveParentGoal(id){
  state.parentGoal=id; saveState();
  var g=PARENT_GOALS.find(function(g){return g.id===id;})||PARENT_GOALS[0];
  toast(g.icon+' Goal: '+g.label); renderSettings(); render();
}

function saveSleepVibe(id){
  state.sleepVibe=id; saveState();
  var v=SLEEP_VIBES.find(function(v){return v.id===id;})||SLEEP_VIBES[1];
  toast(v.icon+' Vibe: '+v.label); renderSettings(); render();
}

function saveBabyProfile(field,value){
  if(!state.babyProfile)state.babyProfile={name:null,gender:null};
  if(field==='gender')state.babyProfile.gender=value==='unset'?null:value;
  else state.babyProfile[field]=value.trim()||null;
  saveState();renderSettings();
}

function toggleSafety(field){
  if(!state.safetyCheck)state.safetyCheck=defaultState().safetyCheck;
  state.safetyCheck[field]=!state.safetyCheck[field];
  saveState();renderSettings();
}

function setSafetyInterval(val){
  if(!state.safetyCheck)state.safetyCheck=defaultState().safetyCheck;
  state.safetyCheck.intervalMins=parseInt(val);
  lastSafetyCheckMins=0;saveState();renderSettings();
}

function exportDataFile() {
  var data = JSON.stringify(state, null, 2);
  var blob = new Blob([data], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var babyName = (state.babyProfile && state.babyProfile.name) ? state.babyProfile.name.toLowerCase() : 'naptracker';
  var date = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = babyName + '-naps-' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('\u2B07\uFE0F Backup downloaded');
}

function importDataFile(input) {
  var file = input.files[0];
  if (!file) return;
  var ok = document.getElementById('import-ok');
  var err = document.getElementById('import-err');
  if (ok) ok.style.display = 'none';
  if (err) err.style.display = 'none';
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var parsed = JSON.parse(e.target.result);
      if (!parsed.days) throw new Error('Invalid file');
      var nc = Object.values(parsed.days).reduce(function(a,n){return a+n.length;}, 0);
      var dc = Object.keys(parsed.days).length;
      state = parsed;
      saveState();
      if (ok) { ok.textContent = '\u2713 Restored ' + nc + ' naps across ' + dc + ' days'; ok.style.display = 'block'; }
      setTimeout(function(){ render(); }, 1200);
    } catch(e) {
      if (err) { err.textContent = "Couldn't read that file — make sure it's a valid backup"; err.style.display = 'block'; }
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function checkSafetyAlert(ongoing){
  if(!ongoing||ongoing.type==='contact'){lastSafetyCheckMins=0;return;}
  var sc=state.safetyCheck||defaultState().safetyCheck;
  if(ongoing.type==='cot'&&!sc.cotEnabled)return;
  if(ongoing.type==='pram'&&!sc.pramEnabled)return;
  var elapsed=durMins(ongoing.start,nowStr());
  var interval=sc.intervalMins||30;
  var threshold=Math.floor(elapsed/interval)*interval;
  if(threshold>0&&threshold!==lastSafetyCheckMins&&elapsed>=threshold&&elapsed<threshold+2){
    lastSafetyCheckMins=threshold;
    var msg=ongoing.type==='pram'?(sc.pramMessage||'Baby in pram \u2014 stay nearby. {mins} mins into this nap.'):(sc.cotMessage||'Quick check \u2014 baby in cot for {mins} mins.');
    var el=document.getElementById('safety-toast');
    if(el){el.textContent=msg.replace('{mins}',elapsed);el.classList.add('show');setTimeout(function(){el.classList.remove('show');},6000);}
  }
}

function dismissPwaBanner() {
  localStorage.setItem('pwa_banner_dismissed', '1');
  document.getElementById('pwa-banner').style.display = 'none';
}

function getPwaInstallText() {
  var ua = navigator.userAgent;
  if (/iPhone|iPad|iPod/.test(ua) && /Safari/.test(ua) && !/CriOS/.test(ua) && !/FxiOS/.test(ua)) {
    return 'Tap the <strong>Share button ↑</strong> at the bottom of Safari, then tap <strong>"Add to Home Screen"</strong>';
  }
  if (/CriOS/.test(ua)) {
    return 'Tap the <strong>three dots ⋯</strong> at the bottom, then tap <strong>"Add to Home Screen"</strong>';
  }
  if (/Android/.test(ua) && /Chrome/.test(ua)) {
    return 'Tap the <strong>three dots ⋮</strong> in the top right, then tap <strong>"Add to Home screen"</strong>';
  }
  if (/Firefox/.test(ua) || /FxiOS/.test(ua)) {
    return 'Tap the <strong>three dots ⋯</strong> menu, then tap <strong>"Install"</strong> or <strong>"Add to Home Screen"</strong>';
  }
  if (/SamsungBrowser/.test(ua)) {
    return 'Tap the <strong>menu icon</strong> at the bottom, then tap <strong>"Add page to"</strong> → <strong>"Home screen"</strong>';
  }
  return 'Open your browser menu and tap <strong>"Add to Home Screen"</strong> to install';
}

function initPwaBanner() {
  var dismissed = localStorage.getItem('pwa_banner_dismissed');
  var isStandalone = window.navigator.standalone === true
    || window.matchMedia('(display-mode: standalone)').matches;
  if (!dismissed && !isStandalone) {
    var banner = document.getElementById('pwa-banner');
    banner.querySelector('.pwa-banner-text').innerHTML = '<strong>Install for the best experience</strong><br>' + getPwaInstallText();
    banner.style.display = 'flex';
  }
}

render();
initPwaBanner();
setInterval(function(){
  if(currentTab==='today'){
    render();
    var naps=getTodayNaps();
    var ongoing=naps.find(function(n){return n.start&&!n.end;});
    checkSafetyAlert(ongoing);
  }
},60000);
</script>

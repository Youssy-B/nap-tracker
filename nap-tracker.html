<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nap Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d0f14;
  --surface:  #161920;
  --card:     #1e2129;
  --card2:    #252830;
  --border:   #2c303c;
  --accent:   #7eb8f7;
  --text:     #eaecf2;
  --muted:    #6b7080;
  --subtle:   #3a3f50;
  --amber:    #f0b96b;
  --teal:     #5ecfb0;
  --purple:   #b09fec;
  --red:      #e88080;
  --green:    #5ecfb0;
  --contact-bg:  #1e1a2e;
  --contact-col: #b09fec;
  --cot-bg:      #122a22;
  --cot-col:     #5ecfb0;
  --pram-bg:     #2a1e0a;
  --pram-col:    #f0b96b;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; line-height: 1.5; display: flex; flex-direction: column; height: 100dvh; }
.app-header { padding: 16px 16px 8px; flex-shrink: 0; background: var(--bg); }
.header-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
.app-title { font-size: 11px; font-weight: 600; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
.app-date { font-size: 12px; color: var(--muted); }
.tabs { display: flex; gap: 3px; background: var(--surface); border-radius: 12px; padding: 3px; }
.tab { flex: 1; padding: 8px 4px; border-radius: 10px; font-size: 13px; font-weight: 500; text-align: center; cursor: pointer; color: var(--muted); transition: all 0.2s; white-space: nowrap; }
.tab.active { background: var(--card2); color: var(--text); font-weight: 600; }
.tab-content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 12px 16px 100px; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--card2); border: 1px solid var(--border); border-radius: 24px; padding: 10px 20px; font-size: 13px; font-weight: 600; color: var(--text); z-index: 1000; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.toast.show { transform: translateX(-50%) translateY(0); }
.safety-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-120px); background: #1a2a1a; border: 1px solid var(--teal); border-radius: 16px; padding: 12px 18px; font-size: 13px; color: var(--teal); z-index: 999; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); max-width: 320px; text-align: center; line-height: 1.5; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.safety-toast.show { transform: translateX(-50%) translateY(0); }
.fab { position: fixed; bottom: 24px; right: 16px; background: var(--accent); color: #0d0f14; border: none; border-radius: 28px; padding: 13px 20px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; box-shadow: 0 4px 24px rgba(126,184,247,0.25); z-index: 100; transition: transform 0.15s, opacity 0.15s; display: flex; align-items: center; gap: 6px; }
.fab:active { transform: scale(0.94); }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 10px; }
.card-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
.status-card { border-radius: 20px; padding: 18px; margin-bottom: 10px; position: relative; overflow: hidden; }
.status-card.idle { background: var(--surface); border: 1px solid var(--border); }
.status-card.napping-contact { background: var(--contact-bg); border: 1px solid var(--contact-col); }
.status-card.napping-cot { background: var(--cot-bg); border: 1px solid var(--cot-col); }
.status-card.napping-pram { background: var(--pram-bg); border: 1px solid var(--pram-col); }
.status-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.status-main { font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -1px; margin-bottom: 4px; }
.status-sub { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.live-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(0.8); } }
.nap-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.nap-btn { border: none; border-radius: 14px; padding: 14px 12px; cursor: pointer; text-align: left; transition: transform 0.12s, opacity 0.12s; }
.nap-btn:active { transform: scale(0.95); opacity: 0.8; }
.nap-btn-contact { background: var(--contact-bg); border: 1px solid var(--contact-col); }
.nap-btn-cot { background: var(--cot-bg); border: 1px solid var(--cot-col); }
.nap-btn-icon { font-size: 20px; margin-bottom: 6px; display: block; }
.nap-btn-title { font-size: 14px; font-weight: 700; display: block; }
.nap-btn-sub { font-size: 11px; margin-top: 2px; display: block; opacity: 0.8; }
.contact-col { color: var(--contact-col); }
.cot-col { color: var(--cot-col); }
.end-btn { width: 100%; background: transparent; border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; font-family: 'Inter', sans-serif; }
.end-btn:active { background: var(--card2); }
.suggestion { border-radius: 14px; padding: 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.suggestion-contact { background: #1a1a2e; border: 1px solid #3a3260; }
.suggestion-free { background: #122a1e; border: 1px solid #2a5040; }
.suggestion-text { flex: 1; }
.suggestion-label { font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.suggestion-detail { font-size: 12px; color: var(--muted); }
.suggestion-badge { font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 20px; white-space: nowrap; }
.badge-study { background: #1a2a3a; color: var(--accent); }
.badge-chore { background: #1a2a1a; color: var(--teal); }
.badge-rest { background: #1a1a2a; color: var(--purple); }
.badge-short { background: var(--card2); color: var(--muted); }
.chore-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.chore-done { opacity: 0.5; }
.chore-done .chore-name { text-decoration: line-through; }
.chore-left { flex: 1; }
.chore-eyebrow { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
.chore-name { font-size: 15px; font-weight: 600; }
.chore-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
.chore-tick { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; flex-shrink: 0; }
.chore-tick.done { background: var(--teal); border-color: var(--teal); }
.sleep-strip { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 10px; }
.sleep-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 8px; text-align: center; }
.sleep-num { font-size: 18px; font-weight: 800; line-height: 1; margin-bottom: 3px; }
.sleep-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.wake-card { border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.wake-ok { background: var(--surface); border: 1px solid var(--border); }
.wake-amber { background: #2a1e06; border: 1px solid var(--amber); }
.wake-red { background: #2a1010; border: 1px solid var(--red); }
.wake-left { flex: 1; }
.wake-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 2px; }
.wake-ok .wake-eyebrow { color: var(--muted); }
.wake-amber .wake-eyebrow { color: var(--amber); }
.wake-red .wake-eyebrow { color: var(--red); }
.wake-time { font-size: 26px; font-weight: 800; line-height: 1; }
.wake-ok .wake-time { color: var(--text); }
.wake-amber .wake-time { color: var(--amber); }
.wake-red .wake-time { color: var(--red); }
.wake-hint { font-size: 12px; margin-top: 3px; }
.wake-ok .wake-hint { color: var(--muted); }
.wake-amber .wake-hint { color: var(--amber); }
.wake-red .wake-hint { color: var(--red); }
.wake-avg { font-size: 11px; color: var(--muted); text-align: right; line-height: 1.6; }
.night-card { background: linear-gradient(135deg,#1a1a2e,#161920); border: 1px solid var(--purple); border-radius: 16px; padding: 16px; margin-bottom: 10px; }
.progress-bar { background: var(--border); border-radius: 4px; height: 4px; overflow: hidden; margin-top: 6px; }
.progress-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.4s ease; }
.nap-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.nap-item:last-child { border-bottom: none; }
.nap-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dot-contact { background: var(--contact-col); }
.dot-cot { background: var(--cot-col); }
.dot-pram { background: var(--pram-col); }
.nap-time { font-size: 14px; font-weight: 600; flex: 1; }
.nap-dur { font-size: 13px; color: var(--accent); }
.nap-type { font-size: 11px; color: var(--muted); }
.icon-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; font-size: 15px; line-height: 1; }
.form-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: flex-end; }
.form-overlay.open { display: flex; }
.form-sheet { background: var(--surface); border-radius: 24px 24px 0 0; padding: 20px 16px 40px; width: 100%; max-height: 85vh; overflow-y: auto; border-top: 1px solid var(--border); }
.sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.sheet-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.field-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; display: block; }
.field-input { background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; padding: 10px 12px; width: 100%; outline: none; margin-bottom: 14px; }
.field-input:focus { border-color: var(--accent); }
.type-pills { display: flex; gap: 6px; margin-bottom: 14px; }
.type-pill { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all 0.15s; }
.type-pill.sel-contact { background: var(--contact-bg); color: var(--contact-col); border-color: var(--contact-col); }
.type-pill.sel-cot { background: var(--cot-bg); color: var(--cot-col); border-color: var(--cot-col); }
.type-pill.sel-pram { background: var(--pram-bg); color: var(--pram-col); border-color: var(--pram-col); }
.btn-primary { background: var(--accent); color: #0d0f14; border: none; border-radius: 12px; padding: 13px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; width: 100%; margin-bottom: 8px; }
.btn-secondary { background: transparent; border: 1px solid var(--border); border-radius: 12px; padding: 11px; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--muted); cursor: pointer; width: 100%; }
.pattern-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 10px; }
.pattern-title { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 10px; }
.pattern-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.pattern-row:last-child { border-bottom: none; }
.p-key { color: var(--muted); }
.p-val { font-weight: 600; }
/* 7-day Gantt map */
.gantt-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 10px; }
.gantt-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--accent); margin-bottom: 12px; }
.gantt-axis { display: flex; justify-content: space-between; margin-bottom: 6px; padding-left: 36px; }
.gantt-axis-label { font-size: 10px; color: var(--muted); }
.gantt-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.gantt-day-label { font-size: 11px; font-weight: 600; color: var(--muted); width: 30px; flex-shrink: 0; text-align: right; }
.gantt-track { flex: 1; height: 16px; background: var(--surface); border-radius: 4px; position: relative; overflow: hidden; }
.gantt-seg { position: absolute; height: 100%; border-radius: 3px; opacity: 0.9; }
/* Stats 2x2 grid */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.stat-tile { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; }
.stat-tile-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 4px; }
.stat-tile-value { font-size: 24px; font-weight: 800; line-height: 1; letter-spacing: -0.5px; }
.stat-tile-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
/* Prediction card */
.prediction-card { background: linear-gradient(135deg, #1a2030, #161920); border: 1px solid var(--accent); border-radius: 16px; padding: 14px; margin-bottom: 10px; }
.prediction-eyebrow { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--accent); margin-bottom: 8px; }
.prediction-body { font-size: 14px; color: var(--text); line-height: 1.6; }
.prediction-body strong { color: var(--accent); }
.prediction-stats { display: flex; gap: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.prediction-stat { font-size: 11px; color: var(--muted); }
.prediction-stat strong { color: var(--text); }
/* Gap opportunity cards */
.gaps-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); margin-bottom: 8px; }
.gap-card { border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; gap: 10px; border-left: 3px solid transparent; }
.gap-card-focus { background: var(--card); border-color: var(--teal); }
.gap-card-quick { background: var(--card); border-color: var(--amber); }
.gap-card-rest { background: var(--card); border-color: var(--purple); }
.gap-card-left { flex: 1; }
.gap-card-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
.gap-card-detail { font-size: 12px; color: var(--muted); line-height: 1.4; }
.gap-card-badge { font-size: 10px; font-weight: 700; padding: 5px 9px; border-radius: 20px; white-space: nowrap; text-align: center; flex-shrink: 0; }
.gap-badge-focus { background: #122a22; color: var(--teal); }
.gap-badge-quick { background: #2a1e06; color: var(--amber); }
.gap-badge-rest  { background: #1e1a2e; color: var(--purple); }
.section-toggle { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 10px 0; margin-bottom: 6px; }
.section-toggle-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.section-toggle-chevron { font-size: 12px; color: var(--accent); }
.history-day { background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 8px; overflow: hidden; }
.history-day-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; cursor: pointer; }
.history-day-title { font-weight: 700; font-size: 14px; color: var(--accent); }
.history-day-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.history-day-chevron { font-size: 12px; color: var(--accent); }
.history-day-body { padding: 0 14px 12px; display: none; }
.history-day-body.open { display: block; }
.day-bar { height: 7px; background: var(--border); border-radius: 4px; position: relative; overflow: hidden; margin: 8px 0; }
.bar-seg { position: absolute; height: 100%; border-radius: 2px; opacity: 0.85; }
.history-nap { font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
.history-nap:last-child { border-bottom: none; }
.settings-group { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 10px; overflow: hidden; }
.settings-group-header { padding: 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
.settings-group-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
.settings-group-body { display: none; border-top: 1px solid var(--border); }
.settings-group-body.open { display: block; }
.settings-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); }
.settings-row:last-child { border-bottom: none; }
.settings-row-label { font-size: 15px; }
.settings-row-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.settings-row-val { font-size: 14px; color: var(--accent); }
.toggle-switch { width: 42px; height: 24px; border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
.toggle-switch.on { background: var(--accent); }
.toggle-switch.off { background: var(--subtle); }
.toggle-knob { position: absolute; width: 18px; height: 18px; background: white; border-radius: 50%; top: 3px; transition: left 0.2s; }
.toggle-switch.on .toggle-knob { left: 21px; }
.toggle-switch.off .toggle-knob { left: 3px; }
.select-input { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; padding: 8px 12px; outline: none; appearance: none; width: 100%; margin-top: 6px; }
.schedule-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 14px; border-bottom: 1px solid var(--border); }
.schedule-row:last-child { border-bottom: none; }
.schedule-day { font-size: 13px; font-weight: 600; color: var(--muted); min-width: 90px; }
.schedule-task { font-size: 14px; text-align: right; flex: 1; }
.schedule-override { color: var(--accent); }
.schedule-anchor { color: var(--amber); }
.schedule-rest { color: var(--muted); font-style: italic; }
.task-row { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-bottom: 1px solid var(--border); }
.task-row:last-child { border-bottom: none; }
.task-rank { font-size: 12px; color: var(--muted); min-width: 20px; text-align: center; }
.task-label { font-size: 14px; flex: 1; }
.task-mins { font-size: 11px; color: var(--muted); }
.add-task-form { padding: 12px 14px; background: var(--card2); display: none; }
.add-task-form.open { display: block; }
.export-box { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 11px; padding: 10px; width: 100%; min-height: 70px; outline: none; resize: none; line-height: 1.4; margin-bottom: 8px; }
.weekly-card { background: linear-gradient(135deg, #1a2030, #161920); border: 1px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 10px; }
.weekly-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
.weekly-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.weekly-stat { text-align: center; }
.weekly-num { font-size: 20px; font-weight: 800; color: var(--text); line-height: 1; }
.weekly-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.empty { text-align: center; color: var(--muted); font-size: 14px; padding: 32px 0; line-height: 2; }
.version-note { text-align: center; font-size: 12px; color: var(--subtle); padding: 12px 0; }
.inline-btn { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 12px; padding: 5px 10px; cursor: pointer; font-family: 'Inter', sans-serif; }
.inline-btn-blue { color: var(--accent); }
.inline-btn-red { color: var(--red); }
/* Survival Mode */
.survival-banner { background: #2a1010; border: 1px solid var(--red); border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.survival-text { flex: 1; }
.survival-title { font-size: 14px; font-weight: 700; color: var(--red); }
.survival-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.survival-btn { background: var(--red); color: #fff; border: none; border-radius: 10px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; white-space: nowrap; }
/* Baby wearing toggle */
.wearing-bar { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; margin-bottom: 10px; cursor: pointer; }
.wearing-bar.active { background: #1e1a2e; border-color: var(--contact-col); }
.wearing-icon { font-size: 18px; }
.wearing-label { flex: 1; font-size: 14px; font-weight: 600; }
.wearing-bar .toggle-switch { flex-shrink: 0; }
/* Window routes (3-choice panel) */
.window-panel { margin-bottom: 10px; }
.window-toggle { width:100%;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;margin-bottom:10px;font-family:'Inter',sans-serif; }
.window-toggle-label { font-size:14px;font-weight:600;color:var(--text); }
.window-toggle-chevron { font-size:12px;color:var(--accent); }
.window-heading { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }
.window-route { border-radius: 14px; padding: 13px 14px; margin-bottom: 7px; cursor: pointer; border: 1px solid transparent; transition: opacity 0.15s; }
.window-route:active { opacity: 0.8; }
.window-route-productivity { background: #122a22; border-color: #2a5040; }
.window-route-quickwin { background: #1a2030; border-color: #2a3660; }
.window-route-selfcare { background: #1e1a2e; border-color: #3a3260; }
.window-route-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 4px; }
.window-route-label { font-size: 15px; font-weight: 700; }
.window-route-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.badge-prod { background: #1a3a28; color: var(--teal); }
.badge-quick { background: #1a2a3a; color: var(--accent); }
.badge-care { background: #2a1a3a; color: var(--purple); }
.window-route-tasks { font-size: 12px; color: var(--muted); }
/* Noise/Energy pill badges on chores */
.chore-badges { display: flex; gap: 4px; margin-top: 4px; }
.chore-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 8px; }
.badge-noise-low { background: #122a22; color: var(--teal); }
.badge-noise-med { background: #2a1e06; color: var(--amber); }
.badge-noise-high { background: #2a1010; color: var(--red); }
.badge-energy-low { background: var(--card2); color: var(--muted); }
.badge-energy-med { background: #1a2030; color: var(--accent); }
.badge-energy-high { background: #2a1030; color: var(--purple); }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-row">
    <div class="app-title">Nap Tracker</div>
    <div class="app-date" id="app-date"></div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('today',this)">Today</div>
    <div class="tab" onclick="switchTab('patterns',this)">Patterns</div>
    <div class="tab" onclick="switchTab('history',this)">History</div>
    <div class="tab" onclick="switchTab('settings',this)">Settings</div>
  </div>
</div>

<div class="tab-content" id="tab-content"></div>
<button class="fab" id="fab" onclick="openForm()">+ Log nap</button>

<div class="form-overlay" id="form-overlay" onclick="handleOverlayClick(event)">
  <div class="form-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="form-title">Log nap</div>
    <label class="field-label">Date</label>
    <input class="field-input" type="date" id="f-date">
    <label class="field-label">Start time</label>
    <input class="field-input" type="time" id="f-start">
    <label class="field-label">End time</label>
    <input class="field-input" type="time" id="f-end">
    <label class="field-label">Type</label>
    <div class="type-pills">
      <div class="type-pill sel-contact" onclick="selType('contact')">Contact</div>
      <div class="type-pill" onclick="selType('cot')">Cot / Pram</div>
    </div>
    <button class="btn-primary" id="form-save-btn" onclick="saveForm()">Save nap</button>
    <button class="btn-secondary" onclick="closeForm()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="safety-toast" id="safety-toast"></div>

<script>
var ROTATING_CHORES = ['Laundry on','Hoover & sweep','Bathrooms','Laundry fold & put away'];
var DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

var PARENT_GOALS = [
  { id:'rest',     icon:'☕', label:'Pure Rest & Self-Care',
    contactTasks: ['Rest / nap','Podcast','Mindfulness','Read something just for you'],
    freeTasks:    ['☕ Hot drink & sit down','🛋️ Total rest','🎧 Headphones on'],
    windowLabel:  'Your rest window',
    insight:      'Protecting your rest is the goal. Even 20 mins horizontal counts.' },
  { id:'work',     icon:'💻', label:'Remote Work / Side Hustle',
    contactTasks: ['Reply to messages','LinkedIn','Job applications'],
    freeTasks:    ['💻 Deep work block','📧 Clear inbox','📋 Plan next steps'],
    windowLabel:  'Work window open',
    insight:      'This is your uninterrupted focus block. Silence notifications and go.' },
  { id:'study',    icon:'📚', label:'Studying & Learning',
    contactTasks: ['Online course','Reading','Research / notes'],
    freeTasks:    ['📚 Study session','✍️ Take notes','🧠 Practice problems'],
    windowLabel:  'Study window open',
    insight:      'Even a 25-min Pomodoro moves the needle. Start before you feel ready.' },
  { id:'fitness',  icon:'💪', label:'Workout / Physical Health',
    contactTasks: ['Mindfulness','Rest / nap'],
    freeTasks:    ['💪 Quick workout','🧘 Stretch / yoga','🚶 Walk if possible'],
    windowLabel:  'Movement window',
    insight:      'A 20-min workout beats a 0-min perfect plan. Get moving.' },
  { id:'creative', icon:'🎨', label:'Hobbies & Creative Time',
    contactTasks: ['Journal','Creative project','Podcast'],
    freeTasks:    ['🎨 Creative time','✍️ Journal','🎵 Something you enjoy'],
    windowLabel:  'Creative window',
    insight:      'This is yours. No guilt — creative recharge makes you a better parent.' }
];

var SLEEP_VIBES = [
  { id:'predictable', label:'Predictable (Steady schedule)',  icon:'🟢',
    wakeWindowMod: 1.0,  // use normal avg
    insight: 'Naps are steady — you can plan around them with confidence.' },
  { id:'chaos',       label:'Complete Chaos (Unpredictable)', icon:'🟡',
    wakeWindowMod: 0.85, // tighter buffer
    insight: 'Naps are all over the place — keep tasks short and stay ready to pivot.' },
  { id:'regression',  label:'Sleep Regression / Teething',    icon:'🔴',
    wakeWindowMod: 0.7,  // much tighter
    insight: 'This is a hard phase. Chores can wait. Survival Mode is there when you need it.' }
];

// Chore database with noise + energy scoring (noise: 0=silent,1=low,2=high; energy: 0=low,1=med,2=high)
var FREE_CHORES_DB = {
  'Laundry on':           { noise:0, energy:0, wearing:true,  icon:'🫧' },
  'Laundry fold & put away': { noise:0, energy:0, wearing:true, icon:'👕' },
  'Hoover & sweep':       { noise:2, energy:1, wearing:false, icon:'🧹' },
  'Bathrooms':            { noise:0, energy:1, wearing:false, icon:'🚿' },
  'Wipe down counters':   { noise:0, energy:0, wearing:true,  icon:'🧽' },
  'Load dishwasher':      { noise:0, energy:0, wearing:true,  icon:'🍽️' },
  'Prep dinner':          { noise:0, energy:1, wearing:false, icon:'🥘' },
  'Reply to emails':      { noise:0, energy:0, wearing:true,  icon:'📧' },
  'Sort mail':            { noise:0, energy:0, wearing:true,  icon:'📬' },
  'Mop floors':           { noise:0, energy:1, wearing:false, icon:'🧴' },
  'Take a shower':        { noise:0, energy:0, wearing:false, icon:'🚿' },
  'Empty household bins': { noise:0, energy:0, wearing:false, icon:'🗑️' },
  'Put bins out':         { noise:0, energy:0, wearing:false, icon:'♻️' },
  'Food shopping':        { noise:0, energy:1, wearing:false, icon:'🛒' },
  'Write shopping list':  { noise:0, energy:0, wearing:true,  icon:'📝' },
  'Free tidy / catch-up': { noise:0, energy:0, wearing:true,  icon:'✨' }
};

function getNightMessages(name, pronoun) {
  var ref = name || 'Baby';
  var pro = pronoun;
  return [
    ref + "'s down. You did that. \uD83C\uDF19",
    ref + "'s asleep. You're officially off duty. Rest well.",
    "Another day done. You showed up for " + ref + " today. \u2728",
    "Lights out. Go be a person for a bit. \uD83D\uDC99",
    (pro ? pro.charAt(0).toUpperCase()+pro.slice(1) : ref) + "'s sleeping. So should you \u2014 eventually. \uD83C\uDF1B",
    "Day complete. You carried " + (pro?'her':ref) + ", fed " + (pro?'her':ref) + ", loved " + (pro?'her':ref) + ". That counts.",
    "The hardest job in the world, and you did it again today.",
    "Night mode activated. Time is yours now. \uD83C\uDF1F",
    ref + ": sleeping. You: a hero who could really use a snack.",
    (pro ? pro.charAt(0).toUpperCase()+pro.slice(1) : ref) + "'s out. Whatever you need right now \u2014 go get it.",
    "One more day ticked. You're doing better than you think. \uD83D\uDC9B",
    "Sleep tight, little one. You too. \uD83C\uDF19",
    "The night shift starts now. But first \u2014 breathe.",
    "Day survived. " + ref + " thriving. You're the reason. \u2728"
  ];
}

function getTonightMessage() {
  var profile = state.babyProfile || {};
  var name = profile.name || null;
  var gender = profile.gender || null;
  var pronoun = gender === 'girl' ? 'she' : gender === 'boy' ? 'he' : null;
  var messages = getNightMessages(name, pronoun);
  var dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(),0,0))/86400000);
  return messages[dayOfYear % messages.length];
}

function defaultState() {
  return {
    schemaVersion: '2.2.0',
    days: {},
    wakeTime: null, wakeDate: null,
    bedTime: null, bedDate: null,
    choreDone: false, choreDoneDate: null,
    babyProfile: { name: null, gender: null },
    choreConfig: { binDay: null, shoppingDay: null, restDay: null, overrides: {} },
    safetyCheck: { cotEnabled: true, pramEnabled: true, intervalMins: 30,
      cotMessage: 'Quick check \u2014 baby has been in the cot for {mins} mins.',
      pramMessage: 'Baby in pram \u2014 stay nearby. {mins} mins into this nap.' },
    survivalMode: false, survivalUntil: null,
    babyWearing: false,
    parentGoal: 'rest',
    sleepVibe: 'chaos'
  };
}

function loadState() {
  try {
    var s = JSON.parse(localStorage.getItem('naptracker'));
    if (!s) return defaultState();
    var d = defaultState();
    if (!s.choreConfig) s.choreConfig = d.choreConfig;
    if (!s.choreConfig.overrides) s.choreConfig.overrides = {};
    if (!s.babyProfile) s.babyProfile = d.babyProfile;
    if (!s.safetyCheck) s.safetyCheck = d.safetyCheck;
    if (s.choreDone === undefined) { s.choreDone = false; s.choreDoneDate = null; }
    if (s.survivalMode === undefined) { s.survivalMode = false; s.survivalUntil = null; }
    if (s.babyWearing === undefined) { s.babyWearing = false; }
    if (!s.parentGoal) s.parentGoal = 'rest';
    if (!s.sleepVibe) s.sleepVibe = 'chaos';
    return s;
  } catch(e) { return defaultState(); }
}

function saveState() { try { localStorage.setItem('naptracker', JSON.stringify(state)); } catch(e) {} }

var state = loadState();

var _today = new Date().toISOString().split('T')[0];
var _yest = (function(){ var d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().split('T')[0]; })();
if (!state.wakeDate || state.wakeDate !== _today) { state.wakeTime = null; state.wakeDate = null; }
if (!state.bedDate || (state.bedDate !== _yest && state.bedDate !== _today)) { state.bedTime = null; state.bedDate = null; }
if (!state.choreDoneDate || state.choreDoneDate !== _today) { state.choreDone = false; state.choreDoneDate = null; }
saveState();

var currentTab = 'today';
var formEditingNap = null;
var formSelectedType = 'contact';
var expandedDays = {};
var patternsExpanded = false;
var windowRoutesOpen = false;
var expandedSettings = {'parent-goal':false, baby:false, chores:false, safety:false, data:false};
var lastSafetyCheckMins = 0;

function todayKey() { return new Date().toISOString().split('T')[0]; }

function nowStr() {
  var n = new Date();
  return pad(n.getHours()) + ':' + pad(n.getMinutes());
}

function pad(n) { return String(n).padStart(2,'0'); }

function fmtTime(t) {
  if (!t) return '\u2014';
  var p = t.split(':'); var hr = parseInt(p[0]);
  return (hr>12?hr-12:hr||12) + ':' + p[1] + (hr>=12?'pm':'am');
}

function durMins(s, e) {
  if (!s||!e) return 0;
  var a=s.split(':').map(Number), b=e.split(':').map(Number);
  return Math.max(0,(b[0]*60+b[1])-(a[0]*60+a[1]));
}

function fmtDur(m) {
  if (!m||m<=0) return '\u2014';
  if (m<60) return m+'m';
  return Math.floor(m/60)+'h'+(m%60>0?' '+m%60+'m':'');
}

function typeColor(t) {
  return {contact:'var(--contact-col)',cot:'var(--cot-col)',pram:'var(--pram-col)'}[t]||'var(--muted)';
}

function getTodayNaps() {
  return (state.days[todayKey()]||[]).slice().sort(function(a,b){return a.start.localeCompare(b.start);});
}

function getNapTotal() {
  return getTodayNaps().reduce(function(a,n){return a+durMins(n.start,n.end);},0);
}

function getAvgWakeWindow() {
  var allNaps = Object.values(state.days).reduce(function(a,b){return a.concat(b);},[]).filter(function(n){return n.start&&n.end;});
  if (allNaps.length<2) return 90;
  return Math.round(allNaps.reduce(function(a,n){return a+durMins(n.start,n.end);},0)/allNaps.length);
}

function getWakeWindowMins() {
  var naps = getTodayNaps();
  var completed = naps.filter(function(n){return n.end;}).sort(function(a,b){return b.end.localeCompare(a.end);});
  var wakeStart = completed.length > 0 ? completed[0].end : state.wakeTime;
  if (!wakeStart) return null;
  return durMins(wakeStart, nowStr());
}

function getOvernight() {
  if (!state.bedTime || !state.wakeTime) return null;
  var bh=state.bedTime.split(':').map(Number), wh=state.wakeTime.split(':').map(Number);
  if (state.bedDate === todayKey() && state.wakeDate === todayKey()) return null;
  return Math.max(0,(24*60-(bh[0]*60+bh[1]))+(wh[0]*60+wh[1]));
}

function getPrevDay(d) { return (d+6)%7; }

function getChoreForDay(dayIndex) {
  var cfg = state.choreConfig;
  var binDay=cfg.binDay, shopDay=cfg.shoppingDay, restDay=cfg.restDay;
  var overrides=cfg.overrides||{};
  if (overrides[dayIndex] !== undefined) return overrides[dayIndex];
  if (restDay!==null && restDay!==undefined && dayIndex===restDay) return null;
  var tasks=[];
  if (binDay!==null && binDay!==undefined && dayIndex===binDay) tasks.push('Put bins out for collection');
  if (binDay!==null && binDay!==undefined && dayIndex===getPrevDay(binDay)) tasks.push('Empty household bins + clean fridge');
  if (shopDay!==null && shopDay!==undefined && dayIndex===shopDay) tasks.push('Food shopping');
  if (shopDay!==null && shopDay!==undefined && dayIndex===getPrevDay(shopDay)) tasks.push('Check fridge + write shopping list');
  if (tasks.length>0) return tasks.join(' / ');
  var anchors={};
  [binDay,shopDay,restDay,binDay!==null?getPrevDay(binDay):null,shopDay!==null?getPrevDay(shopDay):null].forEach(function(d){if(d!==null&&d!==undefined)anchors[d]=1;});
  var rotDays=[1,2,3,4,5,6,0].filter(function(d){return !anchors[d];});
  var ri=rotDays.indexOf(dayIndex);
  if (ri<ROTATING_CHORES.length) return ROTATING_CHORES[ri];
  return 'Free tidy / catch-up';
}

function getContactSuggestion(napMins) {
  var goal = PARENT_GOALS.find(function(g){ return g.id === state.parentGoal; }) || PARENT_GOALS[0];

  // Build task list from goal's contactTasks, with time thresholds
  var tasks = goal.contactTasks.map(function(label, i) {
    return { label: label, minMins: i === 0 ? 5 : i === 1 ? 10 : 20 };
  });

  // Find the current best task given elapsed time
  var current = null, next = null, completed = [];
  for (var i = 0; i < tasks.length; i++) {
    if (napMins >= tasks[i].minMins) {
      // Check if a longer task is also available
      var hasLonger = tasks.slice(i+1).some(function(t){ return napMins >= t.minMins; });
      if (hasLonger) { completed.push(tasks[i]); }
      else { current = tasks[i]; break; }
    }
  }
  if (!current && completed.length) { current = completed.pop(); }

  if (!current) {
    // Not enough time yet — show what's coming
    var upcoming = tasks[0];
    return {
      label: 'Just starting…',
      detail: goal.icon + ' ' + upcoming.label + ' unlocks at ' + upcoming.minMins + 'm',
      completed: [],
      next: upcoming
    };
  }

  var nextTask = null;
  for (var j = 0; j < tasks.length; j++) {
    if (napMins < tasks[j].minMins) { nextTask = tasks[j]; break; }
  }

  return {
    label: goal.icon + ' ' + current.label,
    detail: goal.label + ' · ' + current.minMins + 'm+ reached',
    completed: completed,
    next: nextTask
  };
}

function toast(msg) {
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2500);
}

function isSurvivalActive() {
  if (!state.survivalMode) return false;
  if (!state.survivalUntil) return false;
  return new Date().getTime() < state.survivalUntil;
}

function toggleSurvivalMode() {
  if (isSurvivalActive()) {
    state.survivalMode = false; state.survivalUntil = null;
    saveState(); toast('Survival Mode off — chores back'); render();
  } else {
    state.survivalMode = true;
    state.survivalUntil = new Date().getTime() + 48*60*60*1000;
    saveState(); toast('🆘 Survival Mode — 48hrs, no chores'); render();
  }
}

function toggleWearing() {
  state.babyWearing = !state.babyWearing;
  saveState(); render();
}

function getChoreMeta(choreName) {
  if (!choreName) return null;
  // Look up in DB, partial match for compound strings
  if (FREE_CHORES_DB[choreName]) return FREE_CHORES_DB[choreName];
  // Try partial match for compound chores like "Put bins out / Food shopping"
  var parts = choreName.split(' / ');
  for (var i=0; i<parts.length; i++) {
    var k = parts[i].trim();
    if (FREE_CHORES_DB[k]) return FREE_CHORES_DB[k];
  }
  return { noise:0, energy:0, wearing:true, icon:'✨' };
}

function noiseLabel(n) { return ['🔇 Silent','🔉 Low noise','🔊 Loud'][n]||''; }
function energyLabel(e) { return ['💤 Low energy','⚡ Medium','🔥 High energy'][e]||''; }
function noiseBadgeClass(n) { return ['badge-noise-low','badge-noise-low','badge-noise-high'][n]||'badge-noise-low'; }
function energyBadgeClass(e) { return ['badge-energy-low','badge-energy-med','badge-energy-high'][e]||'badge-energy-low'; }

function getChoreBadgeHtml(choreName) {
  var m = getChoreMeta(choreName);
  if (!m) return '';
  var wearing = m.wearing
    ? '<span class="chore-badge badge-noise-low">🤱 Wearing OK</span>'
    : '<span class="chore-badge badge-energy-low">🚫 No wearing</span>';
  return '<div class="chore-badges">'
    + '<span class="chore-badge '+noiseBadgeClass(m.noise)+'">'+noiseLabel(m.noise)+'</span>'
    + '<span class="chore-badge '+energyBadgeClass(m.energy)+'">'+energyLabel(m.energy)+'</span>'
    + wearing
    + '</div>';
}

// Single smart recommendation for a free nap window
function getWindowRecommendation(chore, elapsedMins) {
  var goal = PARENT_GOALS.find(function(g){ return g.id===state.parentGoal; })||PARENT_GOALS[0];
  var vibe = SLEEP_VIBES.find(function(v){ return v.id===state.sleepVibe; })||SLEEP_VIBES[1];
  var wearing = state.babyWearing;
  var choreMeta = chore ? getChoreMeta(chore) : null;
  var choreOk = chore && choreMeta && (!wearing || choreMeta.wearing);

  if (elapsedMins < 10) {
    return {
      icon: '⏳',
      action: 'Window still building',
      detail: 'Rest for now — check back in a few minutes.',
      sub: null,
      color: 'var(--muted)'
    };
  }

  if (elapsedMins < 30) {
    // Lead with goal task only
    var task = goal.freeTasks[0];
    return {
      icon: goal.icon,
      action: task,
      detail: goal.insight,
      sub: vibe.id !== 'predictable' ? vibe.icon+' '+vibe.insight : null,
      color: 'var(--accent)'
    };
  }

  // 30+ mins — goal task + chore if wearing allows
  var task = goal.freeTasks[0];
  var subText = choreOk
    ? 'Enough time to also do: '+(choreMeta&&choreMeta.icon?choreMeta.icon+' ':'')+chore
    : (chore && !choreOk ? 'Chore skipped — carrier on' : null);

  return {
    icon: goal.icon,
    action: task,
    detail: goal.insight,
    sub: subText,
    color: 'var(--accent)'
  };
}

function switchTab(tab, el) {
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('fab').style.display=(tab==='today'||tab==='history')?'flex':'none';
  render();
}

function render() {
  if (currentTab==='today') renderToday();
  else if (currentTab==='patterns') renderPatterns();
  else if (currentTab==='history') renderHistory();
  else renderSettings();
}

function renderToday() {
  var naps=getTodayNaps();
  var ongoing=naps.find(function(n){return n.start&&!n.end;});
  var isWindDown=!!(state.bedTime&&state.bedDate===todayKey());
  var napTotal=getNapTotal();
  var overnight=getOvernight();
  var totalSleep=overnight?napTotal+overnight:napTotal;
  var chore=getChoreForDay(new Date().getDay());
  var avgWW=getAvgWakeWindow();
  var choreDone=state.choreDone&&state.choreDoneDate===todayKey();
  var inSurvival=isSurvivalActive();

  document.getElementById('app-date').textContent=new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});

  var h='';

  // ── Slim goal + vibe strip ────────────────────────────────────
  if (!isWindDown) {
    var todayGoal=PARENT_GOALS.find(function(g){return g.id===state.parentGoal;})||PARENT_GOALS[0];
    var todayVibe=SLEEP_VIBES.find(function(v){return v.id===state.sleepVibe;})||SLEEP_VIBES[1];

  } else if (ongoing) {

  document.getElementById('tab-content').innerHTML=h;
}
function renderPatterns() {

  }

  var allNaps = allDays.reduce(function(a,b){ return a.concat(b[1]); }, []);
  var done = allNaps.filter(function(n){ return n.start && n.end; });

  var avgPerDay = (allNaps.length / allDays.length).toFixed(1);
  var avgWW = getAvgWakeWindow();
  var contactPct = allNaps.length > 0 ? Math.round(allNaps.filter(function(n){ return n.type==='contact'; }).length / allNaps.length * 100) : 0;

  // ── 7-day Gantt ──────────────────────────────────────────────
  var last7 = allDays.slice(0, 7).reverse(); // oldest first for top-to-bottom
  var DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  // Timeline: 6am–11pm = 17hrs = 1020 mins
  var T_START = 6 * 60, T_END = 23 * 60, T_SPAN = T_END - T_START;
  var axisLabels = ['6am','9am','12pm','3pm','6pm','9pm'];
  var axisPositions = [0, 180, 360, 540, 720, 900]; // mins from T_START

  var h = '';

  h += '<div class="gantt-wrap">';
  h += '<div class="gantt-title">📅 7-Day Sleep Map</div>';
  // Axis labels
  h += '<div class="gantt-axis">';
  axisLabels.forEach(function(lbl, i) {
    h += '<span class="gantt-axis-label" style="position:relative;left:'+(i===0?'0':'-10px')+'">'+lbl+'</span>';
  });
  h += '</div>';

  last7.forEach(function(entry) {
    var date = entry[0], naps = entry[1];
    var d = new Date(date+'T12:00:00');
    var dayLabel = DAY_SHORT[d.getDay()];
    var isToday = date === todayKey();
    h += '<div class="gantt-row">';
    h += '<div class="gantt-day-label" style="color:'+(isToday?'var(--accent)':'var(--muted)')+'">'+dayLabel+'</div>';
    h += '<div class="gantt-track">';
    naps.forEach(function(n) {
      if (!n.start) return;
      var sp = n.start.split(':').map(Number);
      var sMins = sp[0]*60+sp[1] - T_START;
      var ep = n.end ? n.end.split(':').map(Number) : null;
      var eMins = ep ? ep[0]*60+ep[1] - T_START : sMins + 45;
      var left = Math.max(0, sMins / T_SPAN * 100);
      var width = Math.min(100 - left, Math.max(1, (eMins - sMins) / T_SPAN * 100));
      var col = {contact:'var(--contact-col)', cot:'var(--cot-col)', pram:'var(--pram-col)'}[n.type] || 'var(--accent)';
      h += '<div class="gantt-seg" style="left:'+left+'%;width:'+width+'%;background:'+col+'"></div>';
    });
    h += '</div></div>';
  });

  // Legend
  h += '<div style="display:flex;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">';
  [['contact','var(--contact-col)','Contact'],['cot','var(--cot-col)','Cot/Pram']].forEach(function(t){
    h += '<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:'+t[1]+'"></div><span style="font-size:11px;color:var(--muted)">'+t[2]+'</span></div>';
  });
  h += '</div></div>';

  // ── Stats 2×2 ────────────────────────────────────────────────
  // Find most common nap start hour (for "Common Start")
  var startHours = done.map(function(n){ return parseInt(n.start.split(':')[0]); });
  var hourFreq = {};
  startHours.forEach(function(hr){ hourFreq[hr] = (hourFreq[hr]||0)+1; });
  var peakHour = Object.keys(hourFreq).sort(function(a,b){ return hourFreq[b]-hourFreq[a]; })[0];
  var peakHourFmt = peakHour ? fmtTime(peakHour+':00') : '—';

  h += '<div class="stats-grid">';
  h += '<div class="stat-tile"><div class="stat-tile-label">Avg naps/day</div><div class="stat-tile-value" style="color:var(--accent)">'+avgPerDay+'</div><div class="stat-tile-sub">blocks</div></div>';
  h += '<div class="stat-tile"><div class="stat-tile-label">Avg nap length</div><div class="stat-tile-value" style="color:var(--teal)">'+fmtDur(avgDur)+'</div><div class="stat-tile-sub">per nap</div></div>';
  h += '<div class="stat-tile"><div class="stat-tile-label">Common start</div><div class="stat-tile-value" style="color:var(--amber);font-size:20px">'+peakHourFmt+'</div><div class="stat-tile-sub">most frequent</div></div>';
  h += '<div class="stat-tile"><div class="stat-tile-label">Wake window avg</div><div class="stat-tile-value" style="color:var(--purple);font-size:20px">'+fmtDur(avgWW)+'</div><div class="stat-tile-sub">between naps</div></div>';
  h += '</div>';

  var vibe = SLEEP_VIBES.find(function(v){ return v.id === state.sleepVibe; }) || SLEEP_VIBES[1];

  var contactCount = done.filter(function(n){ return n.type==='contact'; }).length;
  var cotCount     = done.filter(function(n){ return n.type==='cot'||n.type==='pram'; }).length;
  var likelyType   = cotCount >= contactCount ? 'Cot' : 'Contact';
  var predTimeStr  = peakHour ? fmtTime(peakHour+':00') : '10:30 AM';
  var confidence   = vibe.id === 'predictable' ? 'High confidence' : vibe.id === 'chaos' ? 'Estimate only — naps vary' : 'Low confidence — regression phase';

  h += '<div class="prediction-card">';

  h += '<div class="prediction-body">Your best window for <strong>'+goal.label+'</strong> tomorrow is predicted around <strong>'+predTimeStr+'</strong> during a '+likelyType+' nap.</div>';
  h += '<div class="prediction-stats">';
  h += '<div class="prediction-stat">📊 Naps/day: <strong>'+avgPerDay+'</strong></div>';
  h += '<div class="prediction-stat">⏱ Avg stay: <strong>'+fmtDur(avgDur)+'</strong></div>';

  // ── Recurring Gaps & Opportunities ───────────────────────────
  // Identify gaps: morning (before first nap), afternoon (between naps), evening
  var gaps = [];

  var firstNapMins = done.length > 0
    ? Math.round(done.map(function(n){ return parseInt(n.start.split(':')[0])*60+parseInt(n.start.split(':')[1]); })
        .reduce(function(a,b){ return a+b; }, 0) / done.length)

  if (firstNapMins) {
    var morningGap = firstNapMins - 7*60;
    if (morningGap >= 30) {
      var midMins = Math.round(7*60 + morningGap/2);

      gaps.push({
        icon: '🌅',
        name: 'Morning window ('+fmtDur(morningGap)+')',
        detail: 'Identified most days around '+fmtTime(pad(midHr)+':'+pad(midMin)),
        type: morningGap >= 60 ? 'focus' : 'quick',
        badge: morningGap >= 60 ? 'BEST FOCUS\nWINDOW' : 'QUICK\nGAPS',
        badgeCls: morningGap >= 60 ? 'gap-badge-focus' : 'gap-badge-quick',
        cardCls: morningGap >= 60 ? 'gap-card-focus' : 'gap-card-quick'
      });
    }
  }

  // Afternoon drift: variance of nap start times — high variance = erratic = quick tasks only
  if (done.length >= 4) {
    var startMinsArr = done.map(function(n){ return parseInt(n.start.split(':')[0])*60+parseInt(n.start.split(':')[1]); });
    var mean = startMinsArr.reduce(function(a,b){ return a+b; }, 0) / startMinsArr.length;
    var variance = startMinsArr.reduce(function(a,b){ return a+Math.pow(b-mean,2); }, 0) / startMinsArr.length;
    var stdDev = Math.round(Math.sqrt(variance));

    if (stdDev > 20) {

        icon: '🌇',
        name: 'Afternoon drift (±'+fmtDur(stdDev)+')',
        detail: stdDev > 40 ? 'Highly erratic start times. Best for low-energy tasks.' : 'Some variability — keep tasks interruptible.',
        type: 'quick',
        badge: 'QUICK\nGAPS',
        badgeCls: 'gap-badge-quick',
        cardCls: 'gap-card-quick'
      });
    }
  }

  // Rest opportunity: if contact naps are common, flag it for goal-linked rest
  if (contactPct >= 40) {
    gaps.push({
      icon: goal.icon,
      name: goal.label+' via Contact ('+contactPct+'% of naps)',
      detail: 'Most common nap type for you. Ideal for phone-based '+goal.label.toLowerCase()+' tasks.',

  if (gaps.length > 0) {

    gaps.forEach(function(g) {
      h += '<div class="gap-card '+g.cardCls+'">';
      h += '<div class="gap-card-left"><div class="gap-card-name">'+g.icon+' '+g.name+'</div>';
      h += '<div class="gap-card-detail">'+g.detail+'</div></div>';
      h += '<div class="gap-card-badge '+g.badgeCls+'">'+g.badge.replace('\n','<br>')+'</div>';
      h += '</div>';
    });
  }

  el.innerHTML = h;
}

function renderHistory() {
  var allDays=Object.entries(state.days).sort(function(a,b){return b[0].localeCompare(a[0]);});
  var el=document.getElementById('tab-content');
  if (!allDays.length){el.innerHTML='<div class="empty">No history yet.<br>Start logging today!</div>';return;}
  var h='';
  allDays.forEach(function(entry){
    var date=entry[0], naps=entry[1];
    var sorted=naps.slice().sort(function(a,b){return a.start.localeCompare(b.start);});
    var total=sorted.reduce(function(a,n){return a+durMins(n.start,n.end);},0);
    var d=new Date(date);
    var isToday=date===todayKey();
    var isOpen=date===todayKey()||!!expandedDays[date];
    h+='<div class="history-day">'
      +'<div class="history-day-header" onclick="toggleDay(\''+date+'\')">'
      +'<div><div class="history-day-title">'+(isToday?'Today':d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'}))+'</div>'
      +'<div class="history-day-meta">'+sorted.length+' nap'+(sorted.length!==1?'s':'')+' \u00b7 '+fmtDur(total)+'</div></div>'
      +'<span class="history-day-chevron">'+(isOpen?'\u25b2':'\u25bc')+'</span></div>'
      +'<div class="history-day-body '+(isOpen?'open':'')+'">'
      +'<div class="day-bar">';
    sorted.forEach(function(n){
      if(!n.end)return;
      var sp=n.start.split(':').map(Number);
      var s=Math.max(0,((sp[0]*60+sp[1])-7*60)/780*100);
      var w=Math.min(100-s,durMins(n.start,n.end)/780*100);
      h+='<div class="bar-seg" style="left:'+s+'%;width:'+w+'%;background:'+({contact:'#b09fec',cot:'#5ecfb0',pram:'#f0b96b'}[n.type]||'#888')+'"></div>';
    });
    h+='</div>';
    sorted.forEach(function(n,i){
      var d2=durMins(n.start,n.end);
      h+='<div class="history-nap">'
        +'<div style="width:8px;height:8px;border-radius:50%;background:'+typeColor(n.type)+';flex-shrink:0"></div>'
        +'<span>'+fmtTime(n.start)+(n.end?' \u2192 '+fmtTime(n.end):' (ongoing)')+'</span>'
        +(d2>0?'<span style="color:var(--accent)">'+fmtDur(d2)+'</span>':'')
        +'<span style="color:var(--muted)">'+n.type+'</span>'
        +'<div style="display:flex;gap:4px;margin-left:auto">'
        +'<button class="inline-btn inline-btn-blue" onclick="editNap(\''+date+'\','+i+')">\u270e</button>'
        +'<button class="inline-btn inline-btn-red" onclick="deleteNap(\''+date+'\','+i+')">\xd7</button>'
        +'</div></div>';
    });
    h+='</div></div>';
  });
  el.innerHTML=h;
}

function renderSettings() {
  var cfg=state.choreConfig;
  var napCount=Object.values(state.days).reduce(function(a,n){return a+n.length;},0);
  var dayCount=Object.keys(state.days).length;
  var dayOpts=DAY_NAMES.map(function(d,i){return '<option value="'+i+'" '+(cfg.binDay===i?'selected':'')+'>'+d+'</option>';}).join('');
  var shopOpts=DAY_NAMES.map(function(d,i){return '<option value="'+i+'" '+(cfg.shoppingDay===i?'selected':'')+'>'+d+'</option>';}).join('');
  var restOpts='<option value="null" '+(cfg.restDay===null||cfg.restDay===undefined?'selected':'')+'>No rest day</option>'
    +DAY_NAMES.map(function(d,i){return '<option value="'+i+'" '+(cfg.restDay===i?'selected':'')+'>'+d+'</option>';}).join('');

  function grp(id,title,content){
    var open=!!expandedSettings[id];
    return '<div class="settings-group">'
      +'<div class="settings-group-header" onclick="toggleSettingsGroup(\''+id+'\')">'
      +'<span class="settings-group-title">'+title+'</span>'
      +'<span style="font-size:12px;color:var(--accent)">'+(open?'\u25b2':'\u25bc')+'</span></div>'
      +'<div class="settings-group-body '+(open?'open':'')+'">'+(open?content:'')+'</div></div>';
  }

  var bp=state.babyProfile||defaultState().babyProfile;
  var sc=state.safetyCheck||defaultState().safetyCheck;

  var goalContent='<div style="padding:14px"><div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:10px">What\'s your primary goal right now?</div>'
    +PARENT_GOALS.map(function(g){
      var active=state.parentGoal===g.id;
      return '<div onclick="saveParentGoal(\''+g.id+'\')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:6px;cursor:pointer;border:1px solid '+(active?'var(--accent)':'var(--border)')+';background:'+(active?'#1a2a3a':'var(--card2)')+';">'
        +'<span style="font-size:20px">'+g.icon+'</span>'
        +'<span style="font-size:14px;font-weight:'+(active?'700':'500')+';color:'+(active?'var(--text)':'var(--muted)')+'">'+g.label+'</span>'
        +(active?'<span style="margin-left:auto;font-size:12px;color:var(--accent)">✓</span>':'')
        +'</div>';
    }).join('')
    +'<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin:14px 0 10px">Current sleep vibe</div>'
    +SLEEP_VIBES.map(function(v){
      var active=state.sleepVibe===v.id;
      return '<div onclick="saveSleepVibe(\''+v.id+'\')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;margin-bottom:6px;cursor:pointer;border:1px solid '+(active?'var(--accent)':'var(--border)')+';background:'+(active?'#1a2a3a':'var(--card2)')+';">'
        +'<span style="font-size:18px">'+v.icon+'</span>'
        +'<div style="flex:1"><div style="font-size:14px;font-weight:'+(active?'700':'500')+';color:'+(active?'var(--text)':'var(--muted)')+'">'+v.label+'</div>'
        +(active?'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+v.insight+'</div>':'')
        +'</div>'
        +(active?'<span style="font-size:12px;color:var(--accent)">✓</span>':'')
        +'</div>';
    }).join('')
    +'</div>';

  var babyContent='<div class="settings-row">'
    +'<div><div class="settings-row-label">Baby\'s name</div><div class="settings-row-sub">Used in personalised messages</div></div>'
    +'<input type="text" value="'+(bp.name||'')+'" placeholder="e.g. Aria" onblur="saveBabyProfile(\'name\',this.value)"'
    +' style="background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:\'Inter\',sans-serif;font-size:14px;padding:7px 10px;width:110px;outline:none;text-align:right">'
    +'</div>'
    +'<div class="settings-row" style="border-bottom:none">'
    +'<div><div class="settings-row-label">Gender</div><div class="settings-row-sub">Used in night messages</div></div>'
    +'<div style="display:flex;gap:6px">'
    +['girl','boy','unset'].map(function(g){
      var active=bp.gender===g||(g==='unset'&&!bp.gender);
      return '<button onclick="saveBabyProfile(\'gender\',\''+g+'\')" style="padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid '+(active?'var(--accent)':'var(--border)')+';background:'+(active?'#1a2a3a':'var(--card2)')+';color:'+(active?'var(--accent)':'var(--muted)')+';font-family:\'Inter\',sans-serif">'+(g==='girl'?'Girl':g==='boy'?'Boy':'\u2013')+'</button>';
    }).join('')+'</div></div>';

  var choreContent='<div class="settings-row"><div><div class="settings-row-label">Bin day</div></div>'
    +'<select class="select-input" style="width:auto;min-width:110px" onchange="saveChoreCfg(\'binDay\',this.value)">'+dayOpts+'</select></div>'
    +'<div class="settings-row"><div><div class="settings-row-label">Shopping day</div></div>'
    +'<select class="select-input" style="width:auto;min-width:110px" onchange="saveChoreCfg(\'shoppingDay\',this.value)">'+shopOpts+'</select></div>'
    +'<div class="settings-row"><div><div class="settings-row-label">Rest day</div></div>'
    +'<select class="select-input" style="width:auto;min-width:110px" onchange="saveChoreCfg(\'restDay\',this.value)">'+restOpts+'</select></div>';


  var dataContent='<div class="settings-row"><div class="settings-row-label">Days logged</div><span class="settings-row-val">'+dayCount+'</span></div>'
    +'<div class="settings-row"><div class="settings-row-label">Total naps</div><span class="settings-row-val">'+napCount+'</span></div>'
    +'<div style="padding:12px 14px;border-top:1px solid var(--border)">'
    +'<div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px">Export \u2014 copy before any update</div>'
    +'<textarea class="export-box" readonly onclick="this.select()">'+JSON.stringify(state)+'</textarea>'
    +'<button class="btn-primary" onclick="copyExport()">\uD83D\uDCCB Copy to clipboard</button>'
    +'<div id="copy-ok" style="text-align:center;font-size:13px;color:var(--teal);margin-top:6px;display:none">\u2713 Copied!</div>'
    +'</div>'
    +'<div style="padding:12px 14px;border-top:1px solid var(--border)">'
    +'<div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px">Import \u2014 restore after update</div>'
    +'<textarea id="import-box" class="export-box" placeholder="Paste exported data here..."></textarea>'
    +'<button class="btn-secondary" onclick="importData()">\uD83D\uDCE5 Restore data</button>'
    +'<div id="import-ok" style="text-align:center;font-size:13px;color:var(--teal);margin-top:6px;display:none"></div>'
    +'<div id="import-err" style="text-align:center;font-size:13px;color:var(--red);margin-top:6px;display:none"></div>'
    +'</div>';

  var safetyContent='<div class="settings-row">'
    +'<div><div class="settings-row-label">Cot nap check-ins</div><div class="settings-row-sub">Reminder when baby is in cot</div></div>'
    +'<div class="toggle-switch '+(sc.cotEnabled?'on':'off')+'" onclick="toggleSafety(\'cotEnabled\')"><div class="toggle-knob"></div></div>'
    +'</div>'
    +'<div class="settings-row">'
    +'<div><div class="settings-row-label">Pram nap reminders</div><div class="settings-row-sub">Reminder to stay nearby</div></div>'
    +'<div class="toggle-switch '+(sc.pramEnabled?'on':'off')+'" onclick="toggleSafety(\'pramEnabled\')"><div class="toggle-knob"></div></div>'
    +'</div>'
    +'<div class="settings-row" style="border-bottom:none">'
    +'<div><div class="settings-row-label">Check-in interval</div></div>'
    +'<select class="select-input" style="width:auto;min-width:120px" onchange="setSafetyInterval(this.value)">'
    +'<option value="20" '+(sc.intervalMins===20?'selected':'')+'>Every 20 mins</option>'
    +'<option value="30" '+(sc.intervalMins===30||!sc.intervalMins?'selected':'')+'>Every 30 mins</option>'
    +'<option value="45" '+(sc.intervalMins===45?'selected':'')+'>Every 45 mins</option>'
    +'<option value="60" '+(sc.intervalMins===60?'selected':'')+'>Every 60 mins</option>'
    +'</select></div>';

  document.getElementById('tab-content').innerHTML=
    grp('parent-goal','My goal & sleep vibe',goalContent)
    +grp('baby','Baby profile',babyContent)
    +grp('chores','Chore schedule',choreContent)
    +grp('safety','Safety checks',safetyContent)
    +grp('data','Data',dataContent)
    +'<div class="version-note">v2.4.0 · Goal-driven contact tasks · Clean settings</div>';
}

function quickNap(type){
  var key=todayKey();
  if(!state.days[key])state.days[key]=[];
  state.days[key].push({start:nowStr(),end:'',type:type});
  windowRoutesOpen=false;
  saveState();toast(type==='contact'?'Contact nap started':'Cot / Pram nap started');render();
}

function endOngoingNap(){
  var key=todayKey();
  var naps=state.days[key]||[], on=null;
  for(var i=0;i<naps.length;i++){if(naps[i].start&&!naps[i].end){on=naps[i];break;}}
  if(on){on.end=nowStr();saveState();toast('Nap ended \u00b7 '+fmtDur(durMins(on.start,on.end)));render();}
}

function setWake(v){state.wakeTime=v;state.wakeDate=todayKey();saveState();toast('Wake time saved');render();}
function setBed(v){state.bedTime=v;state.bedDate=todayKey();saveState();toast('Bedtime saved');render();}

function toggleChoreDone(){
  state.choreDone=!state.choreDone;state.choreDoneDate=todayKey();
  saveState();toast(state.choreDone?'Chore done!':'Chore unmarked');render();
}

function deleteNap(dateKey,index){
  if(!state.days[dateKey])return;
  state.days[dateKey].splice(index,1);
  if(!state.days[dateKey].length)delete state.days[dateKey];
  saveState();toast('Nap deleted');render();
}

function toggleWindowRoutes(){windowRoutesOpen=!windowRoutesOpen;render();}

function toggleDay(date){
  expandedDays[date]=!expandedDays[date];renderHistory();
}

function toggleSettingsGroup(id){
  expandedSettings[id]=!expandedSettings[id];renderSettings();
}

function openForm(){
  formEditingNap=null;formSelectedType='contact';
  document.getElementById('f-date').value=todayKey();
  document.getElementById('f-start').value=nowStr();
  document.getElementById('f-end').value='';
  document.getElementById('form-title').textContent='Log nap';
  document.getElementById('form-save-btn').textContent='Save nap';
  updateTypePills();
  document.getElementById('form-overlay').classList.add('open');
}

function editNap(dateKey,index){
  var nap=state.days[dateKey]&&state.days[dateKey][index];
  if(!nap)return;
  formEditingNap={dateKey:dateKey,index:index};formSelectedType=nap.type||'contact';
  document.getElementById('f-date').value=dateKey;
  document.getElementById('f-start').value=nap.start||'';
  document.getElementById('f-end').value=nap.end||'';
  document.getElementById('form-title').textContent='Edit nap';
  document.getElementById('form-save-btn').textContent='Update nap';
  updateTypePills();
  document.getElementById('form-overlay').classList.add('open');
}

function closeForm(){document.getElementById('form-overlay').classList.remove('open');}
function handleOverlayClick(e){if(e.target===document.getElementById('form-overlay'))closeForm();}

function selType(t){formSelectedType=t;updateTypePills();}
function updateTypePills(){
  var types=['contact','cot'];
  document.querySelectorAll('.type-pill').forEach(function(p,i){
    p.className='type-pill'+(formSelectedType===types[i]?' sel-'+types[i]:'');
  });
}

function saveForm(){
  var start=document.getElementById('f-start').value;
  var end=document.getElementById('f-end').value;
  var date=document.getElementById('f-date').value;
  if(!start||!date){toast('Please fill in start time');return;}
  if(formEditingNap){
    state.days[formEditingNap.dateKey][formEditingNap.index]={start:start,end:end||'',type:formSelectedType};
    toast('Nap updated');
  } else {
    if(!state.days[date])state.days[date]=[];
    state.days[date].push({start:start,end:end||'',type:formSelectedType});
    toast('Nap saved');
  }
  saveState();closeForm();render();
}

function saveChoreCfg(field,val){
  state.choreConfig[field]=val==='null'?null:parseInt(val);
  saveState();renderSettings();
}

function saveParentGoal(id){
  state.parentGoal=id; saveState();
  var g=PARENT_GOALS.find(function(g){return g.id===id;})||PARENT_GOALS[0];
  toast(g.icon+' Goal: '+g.label); renderSettings(); render();
}

function saveSleepVibe(id){
  state.sleepVibe=id; saveState();
  var v=SLEEP_VIBES.find(function(v){return v.id===id;})||SLEEP_VIBES[1];
  toast(v.icon+' Vibe: '+v.label); renderSettings(); render();
}

function saveBabyProfile(field,value){
  if(!state.babyProfile)state.babyProfile={name:null,gender:null};
  if(field==='gender')state.babyProfile.gender=value==='unset'?null:value;
  else state.babyProfile[field]=value.trim()||null;
  saveState();renderSettings();
}

function toggleSafety(field){
  if(!state.safetyCheck)state.safetyCheck=defaultState().safetyCheck;
  state.safetyCheck[field]=!state.safetyCheck[field];
  saveState();renderSettings();
}

function setSafetyInterval(val){
  if(!state.safetyCheck)state.safetyCheck=defaultState().safetyCheck;
  state.safetyCheck.intervalMins=parseInt(val);
  lastSafetyCheckMins=0;saveState();renderSettings();
}

function copyExport(){
  var box=document.querySelector('.export-box[readonly]');
  if(!box)return;box.select();
  try{navigator.clipboard.writeText(box.value).catch(function(){document.execCommand('copy');});}catch(e){document.execCommand('copy');}
  var ok=document.getElementById('copy-ok');
  if(ok){ok.style.display='block';setTimeout(function(){ok.style.display='none';},2500);}
}

function importData(){
  var ib=document.getElementById('import-box');
  var raw=ib?ib.value.trim():'';
  var ok=document.getElementById('import-ok'),err=document.getElementById('import-err');
  if(ok)ok.style.display='none';if(err)err.style.display='none';
  if(!raw){if(err){err.textContent='Paste your export first';err.style.display='block';}return;}
  try{
    var parsed=JSON.parse(raw);
    if(!parsed.days)throw new Error();
    var nc=Object.values(parsed.days).reduce(function(a,n){return a+n.length;},0);
    var dc=Object.keys(parsed.days).length;
    state=parsed;saveState();
    if(ok){ok.textContent='Restored '+nc+' naps across '+dc+' days';ok.style.display='block';}
    setTimeout(function(){render();},1500);
  }catch(e){if(err){err.textContent="Couldn't read that data";err.style.display='block';}}
}

function checkSafetyAlert(ongoing){
  if(!ongoing||ongoing.type==='contact'){lastSafetyCheckMins=0;return;}
  var sc=state.safetyCheck||defaultState().safetyCheck;
  if(ongoing.type==='cot'&&!sc.cotEnabled)return;
  if(ongoing.type==='pram'&&!sc.pramEnabled)return;
  var elapsed=durMins(ongoing.start,nowStr());
  var interval=sc.intervalMins||30;
  var threshold=Math.floor(elapsed/interval)*interval;
  if(threshold>0&&threshold!==lastSafetyCheckMins&&elapsed>=threshold&&elapsed<threshold+2){
    lastSafetyCheckMins=threshold;
    var msg=ongoing.type==='pram'?(sc.pramMessage||'Baby in pram \u2014 stay nearby. {mins} mins into this nap.'):(sc.cotMessage||'Quick check \u2014 baby in cot for {mins} mins.');
    var el=document.getElementById('safety-toast');
    if(el){el.textContent=msg.replace('{mins}',elapsed);el.classList.add('show');setTimeout(function(){el.classList.remove('show');},6000);}
  }
}

render();
setInterval(function(){
  if(currentTab==='today'){
    render();
    var naps=getTodayNaps();
    var ongoing=naps.find(function(n){return n.start&&!n.end;});
    checkSafetyAlert(ongoing);
  }
},60000);
</script>
</body>
</html>
